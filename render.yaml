services:
  - type: worker
    name: superguild-resolver-bot
    runtime: node
    plan: starter
    buildCommand: pnpm install
    startCommand: pnpm run bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESOLVER_PRIVATE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ARBITRUM_SEPOLIA_RPC
        sync: false
